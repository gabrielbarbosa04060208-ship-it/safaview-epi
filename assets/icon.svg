<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0b840;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d8f0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield background -->
  <path d="M128 18 L220 52 L220 128 C220 178 178 218 128 238 C78 218 36 178 36 128 L36 52 Z"
        fill="url(#shieldGrad)" stroke="#e8a020" stroke-width="3"/>

  <!-- Inner shield border -->
  <path d="M128 32 L208 62 L208 128 C208 170 172 205 128 222 C84 205 48 170 48 128 L48 62 Z"
        fill="none" stroke="#e8a02040" stroke-width="1.5"/>

  <!-- Helmet shape (top arc suggesting hard hat) -->
  <path d="M88 105 C88 80 108 62 128 62 C148 62 168 80 168 105"
        fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Helmet brim -->
  <rect x="80" y="104" width="96" height="8" rx="4"
        fill="url(#accentGrad)"/>

  <!-- Eye (SafeView signature) -->
  <!-- Eye outline -->
  <ellipse cx="128" cy="148" rx="30" ry="18"
           fill="white" opacity="0.95"/>
  <!-- Iris -->
  <circle cx="128" cy="148" r="12"
          fill="#1a3a8a"/>
  <!-- Pupil -->
  <circle cx="128" cy="148" r="6"
          fill="#0a1830"/>
  <!-- Eye shine -->
  <circle cx="134" cy="143" r="3"
          fill="white" opacity="0.8"/>
  <!-- Eye lashes top -->
  <path d="M98 148 C98 130 118 122 128 122 C138 122 158 130 158 148"
        fill="none" stroke="#c0c8e0" stroke-width="1.5" opacity="0.6"/>

  <!-- EPI text badge at bottom of shield -->
  <rect x="93" y="188" width="70" height="24" rx="5"
        fill="url(#accentGrad)"/>
  <text x="128" y="204" font-family="Arial Black, Arial" font-weight="900"
        font-size="14" fill="#1a1a2e" text-anchor="middle" letter-spacing="2">EPI</text>

  <!-- Corner shield decorations -->
  <circle cx="80"  cy="72"  r="4" fill="#e8a020" opacity="0.4"/>
  <circle cx="176" cy="72"  r="4" fill="#e8a020" opacity="0.4"/>
</svg>